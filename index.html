<!DOCTYPE html>
<html lang="zh-TW">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣 ETF 成分股交叉分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #1f2937;
    --border:    #30363d;
    --border2:   #21262d;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --text3:     #6e7681;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --gold:      #d29922;
    --radius:    10px;
    --radius-lg: 16px;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(88,166,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    position: relative;
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text2);
    position: relative;
  }
  .header-sub b { color: var(--text); }

  /* ── Top-level page tab navigation ── */
  .tab-nav {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 4px;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--text2);
    padding: 13px 20px;
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    font-weight: 500;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Layout ── */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── Section titles ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* ── ETF Cards grid ── */
  .etf-grid {
    margin-bottom: 32px;
  }
  .etf-group {
    margin-bottom: 28px;
  }
  .etf-group-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    padding: 0 2px;
    border-left: 3px solid var(--border);
    padding-left: 12px;
  }
  .etf-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .etf-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .etf-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, var(--accent));
    border-radius: 2px 2px 0 0;
  }
  .etf-card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .etf-card.active {
    border-color: var(--card-color, var(--accent));
    background: color-mix(in srgb, var(--card-color, var(--accent)) 8%, var(--bg2));
  }
  .card-ticker {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--card-color, var(--accent));
    margin-bottom: 2px;
  }
  .card-name {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .card-aum {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: var(--text2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .tag.active-tag {
    background: color-mix(in srgb, var(--card-color) 20%, transparent);
    color: var(--card-color, var(--accent));
    border-color: color-mix(in srgb, var(--card-color) 40%, transparent);
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
  }
  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .controls label {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  select, input[type=text] {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type=text]:focus {
    border-color: var(--accent);
  }
  input[type=text] {
    min-width: 180px;
  }
  input[type=text]::placeholder { color: var(--text3); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--bg3);
    padding: 11px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sort-asc .sort-icon::after { content: '↑'; opacity: 1; }
  thead th.sort-desc .sort-icon::after { content: '↓'; opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border2);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.expanded { background: rgba(88,166,255,0.04); }

  td {
    padding: 10px 14px;
    vertical-align: middle;
  }
  .td-num {
    font-family: var(--mono);
    text-align: right;
  }
  .td-ticker {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    font-size: 14px;
  }
  .td-name {
    font-weight: 500;
  }
  .stock-link {
    color: inherit;
    text-decoration: none;
    position: relative;
  }
  .stock-link::after {
    content: ' ↗';
    font-size: 10px;
    opacity: 0;
    color: var(--accent);
    transition: opacity 0.15s;
  }
  .stock-link:hover::after {
    opacity: 1;
  }

  .dot-row {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .etf-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .etf-pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    white-space: nowrap;
    cursor: default;
  }

  /* ── Expanded row ── */
  .expand-row td {
    padding: 0;
    background: #0d1117;
    border-bottom: 2px solid var(--border);
  }
  .expand-inner {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .expand-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ec-color, var(--accent));
    border-radius: 8px;
    padding: 12px 14px;
  }
  .ec-ticker {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--ec-color, var(--accent));
    margin-bottom: 2px;
  }
  .ec-name { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .ec-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
  }
  .ec-val {
    font-family: var(--mono);
    color: var(--text);
    font-size: 12px;
  }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--text3);
    font-size: 14px;
  }

  /* ── Progress bar for weight ── */
  .weight-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 120px;
  }
  .weight-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    flex: 1;
    overflow: hidden;
  }
  .weight-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .weight-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    min-width: 48px;
    text-align: right;
  }
  .industry-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* ══════════════════════════════════════════
     History page styles
  ══════════════════════════════════════════ */

  .history-split {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  @media (max-width: 900px) {
    .history-split { grid-template-columns: 1fr; }
  }
  .history-wall-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    align-self: start;
  }
  .history-wall-panel .section-title {
    margin-bottom: 12px;
  }
  .wall-empty {
    font-size: 12px;
    color: var(--text3);
    padding: 16px 4px;
    text-align: center;
  }
  .wall-group {
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border2);
  }
  .wall-group:last-child { border-bottom: none; margin-bottom: 0; }

  .wall-group-date {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    padding: 4px 0 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
  }
  .wall-group-date .arrow { color: var(--text3); font-weight: 400; }

  .wall-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin: 12px 0 6px;
  }
  .wall-section-label:first-of-type { margin-top: 0; }
  .wall-add-label { color: var(--green); }
  .wall-rem-label { color: var(--red); }

  /* Stock card — colored left border, dark fill */
  .wall-stock-card {
    background: color-mix(in srgb, var(--bg) 55%, var(--bg3));
    border: 1px solid var(--border2);
    border-left: 3px solid var(--wsc, var(--border));
    border-radius: 8px;
    padding: 9px 12px;
    margin-bottom: 6px;
  }
  .wall-stock-card-add { --wsc: var(--green); }
  .wall-stock-card-rem { --wsc: var(--red);   }

  .wall-stock-header {
    display: flex;
    align-items: baseline;
    gap: 7px;
    margin-bottom: 6px;
  }
  .wall-stock-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .wall-stock-ticker {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  /* ETF row inside card */
  .wall-etf-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 0;
  }
  .wall-etf-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--wc, var(--accent));
    flex-shrink: 0;
  }
  .wall-etf-code {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--wc, var(--accent));
    white-space: nowrap;
  }
  .wall-etf-name {
    font-size: 11px;
    color: var(--text3);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wall-etf-shares {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    padding-left: 6px;
  }
  .wall-shares-add { color: var(--green); }
  .wall-shares-rem { color: var(--red);   }

  .history-content-panel {
    min-width: 0;
  }

  .history-etf-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .history-etf-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--sans);
    transition: all 0.2s;
  }
  .history-etf-tab:hover {
    border-color: var(--tab-color, var(--accent));
    color: var(--text);
  }
  .history-etf-tab.active {
    background: color-mix(in srgb, var(--tab-color, var(--accent)) 12%, var(--bg2));
    border-color: var(--tab-color, var(--accent));
    color: var(--tab-color, var(--accent));
  }
  .het-ticker {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 15px;
  }
  .het-name {
    font-size: 11px;
    opacity: 0.75;
  }

  /* Change event card */
  .change-event {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .change-event-header {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    padding: 14px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .change-date-range {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 14px;
  }
  .change-date { color: var(--text); font-weight: 600; }
  .change-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cpill {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: var(--mono);
    font-weight: 600;
  }
  .cpill-add { background: rgba(63,185,80,0.15);  color: var(--green);  border: 1px solid rgba(63,185,80,0.3); }
  .cpill-rem { background: rgba(248,81,73,0.15);  color: var(--red);    border: 1px solid rgba(248,81,73,0.3); }
  .cpill-chg { background: rgba(88,166,255,0.15); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); }

  .change-body { padding: 20px; }

  .cs-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .cs-label:first-child { margin-top: 0; }
  .cs-label-add  { color: var(--green); }
  .cs-label-rem  { color: var(--red); }
  .cs-label-chg  { color: var(--accent); }
  .cs-label-hold { color: var(--text3); }

  .ci-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 8px;
    margin-bottom: 4px;
  }
  .ci-card {
    background: var(--bg3);
    border-radius: 8px;
    padding: 11px 14px;
    border-left: 3px solid transparent;
  }
  .ci-card-add { border-color: var(--green); }
  .ci-card-rem { border-color: var(--red);   opacity: 0.7; }
  .ci-card-up  { border-color: var(--green); }
  .ci-card-dn  { border-color: #fb923c; }

  .ci-ticker {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .ci-name { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .ci-weight { font-size: 12px; color: var(--text2); }
  .ci-weight span { font-family: var(--mono); color: var(--text); }
  .ci-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 5px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .ci-badge-new { background: rgba(63,185,80,0.2);  color: var(--green); }
  .ci-badge-out { background: rgba(248,81,73,0.2);  color: var(--red); }
  .ci-reason {
    font-size: 11px;
    color: var(--text3);
    margin-top: 7px;
    line-height: 1.55;
  }
  .ci-wchange {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 12px;
    flex-wrap: wrap;
  }

  /* Holdings after change */
  .holdings-after-section {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border2);
  }
  .holdings-after-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px;
    margin-top: 10px;
  }
  .ha-item {
    background: var(--bg3);
    border-radius: 8px;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    position: relative;
    transition: border-color 0.2s;
  }
  .ha-item.new-entry {
    border-color: rgba(63,185,80,0.45);
    background: rgba(63,185,80,0.05);
  }
  .ha-ticker {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }
  .ha-ticker.new-c { color: var(--green); }
  .ha-name  { font-size: 11px; color: var(--text2); margin: 2px 0 4px; }
  .ha-weight {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .ha-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
  }

// ── Page switching ────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; });
  document.getElementById('page-' + name).style.display = '';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const isNotes = name === 'notes';
  document.getElementById('mainHeader').style.display        = isNotes ? 'none' : '';
  document.getElementById('notesInputHeader').style.display  = isNotes ? '' : 'none';
  if (name === 'history') {
    renderHistoryWall();
    renderHistoryETFTabs();
    renderHistoryContent();
  }
  if (isNotes && typeof window.onNotesPageOpen === 'function') {
    window.onNotesPageOpen();
  }
}

// ── Render ETF overview cards ─────────────────────────────────────────────
function renderETFCards() {
  const grid = document.getElementById('etfGrid');
  const passive = ETF_CARDS.filter(e => e.type === 'passive');
  const active = ETF_CARDS.filter(e => e.type === 'active');

  const renderGroup = (title, cards) => `
    <div class="etf-group">
      <div class="etf-group-title">${title}</div>
      <div class="etf-cards">
        ${cards.map((e, i) => `
          <div class="etf-card" style="--card-color:${e.color}"
               onclick="toggleETFFilter('${e.ticker}')" id="card-${e.ticker}">
            <div class="card-ticker">${e.ticker}</div>
            <div class="card-name">${e.name}${e.date ? `<span style="color:var(--text3);font-size:10px;margin-left:4px">(${e.date})</span>` : ''}</div>
            <div class="card-aum">${e.aum}</div>
            <div class="card-tags">
              ${e.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  grid.innerHTML = (passive.length ? renderGroup('被動式', passive) : '') +
                   (active.length ? renderGroup('主動式', active) : '');
}

// ── Render stats bar ──────────────────────────────────────────────────────
function renderStats(rows) {
  const bar = document.getElementById('statsBar');
  const shown      = rows.length;
  const maxCovEtf  = rows.reduce((m,r) => Math.max(m, r.etf_count), 0);
  const maxCovRow  = rows.find(r => r.etf_count === maxCovEtf);
  const totalCap   = rows.reduce((s,r) => s + r.total_capital, 0);
  const etfsWithData = ETF_CARDS.filter(e =>
    CROSS_DATA.some(r => r.etfs.some(x => x.etf_ticker === e.ticker))
  ).length;

  bar.innerHTML = `
    <div class="stat-item">
      <div class="stat-label">顯示成分股</div>
      <div class="stat-value">${shown}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">最高涵蓋數</div>
      <div class="stat-value">${maxCovEtf} / ${ETF_CARDS.length}</div>
      ${maxCovRow ? `<div class="stat-sub">${maxCovRow.name}</div>` : ''}
    </div>
    <div class="stat-item">
      <div class="stat-label">概估涉及總資金</div>
      <div class="stat-value" style="font-size:16px">${formatCapital(totalCap)}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">有持股資料 ETF</div>
      <div class="stat-value">${etfsWithData} 檔</div>
    </div>
  `;
}

function formatCapital(yi) {
  if (yi >= 10000) return (yi/10000).toFixed(1) + ' 兆';
  if (yi >= 1)     return yi.toFixed(0) + ' 億';
  return yi.toFixed(1) + ' 億';
}

// ── Table rendering ───────────────────────────────────────────────────────
let expandedRow = null;
let activeFilters = new Set();
let sortCol = 'total_capital';
let sortDir = -1;

function getFilteredSorted() {
  const minCov = parseInt(document.getElementById('minCoverage').value);
  const q = document.getElementById('search').value.trim().toLowerCase();

  let rows = CROSS_DATA.filter(r => {
    if (r.etf_count < minCov) return false;
    if (q && !r.ticker.toLowerCase().includes(q) && !r.name.toLowerCase().includes(q)) return false;
    if (activeFilters.size > 0) {
      const hasAll = [...activeFilters].every(f =>
        r.etfs.some(e => e.etf_ticker === f)
      );
      if (!hasAll) return false;
    }
    return true;
  });

  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  return rows;
}

function renderTable() {
  const rows = getFilteredSorted();
  const tbody = document.getElementById('tableBody');
  expandedRow = null;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" class="no-results">查無符合條件的成分股</td></tr>`;
    renderStats([]);
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const dots = r.etfs.map(e =>
      `<div class="dot" style="background:${e.color}" title="${e.etf_ticker} ${e.etf_name}"></div>`
    ).join('');

    const pills = r.etfs.map(e => `
      <span class="etf-pill"
            style="color:${e.color};border-color:color-mix(in srgb,${e.color} 40%,transparent);background:color-mix(in srgb,${e.color} 12%,transparent)">
        ${e.etf_ticker} ${e.weight.toFixed(2)}%
      </span>`).join('');

    const industry = INDUSTRY_MAP[r.ticker] || '其他';

    return `
      <tr onclick="toggleExpand(${i}, '${r.ticker}')" data-idx="${i}">
        <td class="td-num" style="color:var(--text3);font-size:11px">${i+1}</td>
        <td class="td-ticker"><a class="stock-link" href="https://www.wantgoo.com/stock/${r.ticker}/technical-chart" target="_blank" rel="noopener" onclick="event.stopPropagation()">${r.ticker}</a></td>
        <td class="td-name"><a class="stock-link" href="https://www.wantgoo.com/stock/${r.ticker}/technical-chart" target="_blank" rel="noopener" onclick="event.stopPropagation()">${r.name}</a></td>
        <td><span class="industry-tag">${industry}</span></td>
        <td>
          <div class="dot-row">${dots}<span style="font-family:var(--mono);font-size:13px;margin-left:4px;color:var(--text2)">${r.etf_count}</span></div>
        </td>
        <td class="td-num" style="color:var(--accent)">${r.max_weight.toFixed(2)}%</td>
        <td class="td-num" style="color:var(--gold)">${r.total_capital.toFixed(0)}</td>
        <td class="td-num">${r.total_shares > 0 ? r.total_shares.toLocaleString() : '--'}</td>
        <td><div class="etf-pills">${pills}</div></td>
      </tr>
      <tr class="expand-row" id="expand-${i}" style="display:none">
        <td colspan="9"></td>
      </tr>
    `;
  }).join('');

  renderStats(rows);

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
    }
  });
}

function toggleExpand(idx, ticker) {
  const expandTr = document.getElementById(`expand-${idx}`);
  const mainTr   = expandTr.previousElementSibling;

  if (expandedRow === idx) {
    expandTr.style.display = 'none';
    mainTr.classList.remove('expanded');
    expandedRow = null;
    return;
  }

  if (expandedRow !== null) {
    const prev = document.getElementById(`expand-${expandedRow}`);
    if (prev) {
      prev.style.display = 'none';
      prev.previousElementSibling.classList.remove('expanded');
    }
  }

  const row = CROSS_DATA.find(r => r.ticker === ticker);
  if (!row) return;

  const inner = row.etfs.map(e => `
    <div class="expand-card" style="--ec-color:${e.color}">
      <div class="ec-ticker">${e.etf_ticker}</div>
      <div class="ec-name">${e.etf_name}</div>
      <div class="ec-row"><span>權重</span><span class="ec-val">${e.weight.toFixed(2)}%</span></div>
      <div class="ec-row"><span>資金</span><span class="ec-val">${e.capital_yi} 億</span></div>
      ${e.shares ? `<div class="ec-row"><span>張數</span><span class="ec-val">${Math.round(e.shares/1000).toLocaleString()} 張</span></div>` : ''}
    </div>
  `).join('');

  expandTr.querySelector('td').innerHTML = `<div class="expand-inner">${inner}</div>`;
  expandTr.style.display = '';
  mainTr.classList.add('expanded');
  expandedRow = idx;
}

// ── ETF card filter ───────────────────────────────────────────────────────
function toggleETFFilter(ticker) {
  const card = document.getElementById(`card-${ticker}`);
  if (activeFilters.has(ticker)) {
    activeFilters.delete(ticker);
    card.classList.remove('active');
    card.querySelectorAll('.tag').forEach(t => t.classList.remove('active-tag'));
  } else {
    activeFilters.add(ticker);
    card.classList.add('active');
    card.querySelectorAll('.tag').forEach(t => t.classList.add('active-tag'));
  }
  renderTable();
}

// ── Sort ──────────────────────────────────────────────────────────────────
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = col === 'ticker' ? 1 : -1; }
    renderTable();
  });
});

document.getElementById('minCoverage').addEventListener('change', renderTable);
document.getElementById('search').addEventListener('input', renderTable);

// ══════════════════════════════════════════════════════════════════════════
// History page
// ══════════════════════════════════════════════════════════════════════════

let activeHistoryETF = HISTORY_DATA[0]?.ticker || '';

function renderHistoryWall() {
  const container = document.getElementById('historyWall');
  if (!container) return;
  if (!WALL_DATA.length) {
    container.innerHTML = '<div class="wall-empty">暫無新增/移出紀錄</div>';
    return;
  }

  const renderEtfRow = (e, sign, sharesClass) => `
    <div class="wall-etf-row" style="--wc:${e.color}">
      <span class="wall-etf-dot"></span>
      <span class="wall-etf-code">${e.etf_ticker}</span>
      <span class="wall-etf-name">${e.etf_name}</span>
      ${e.shares_zhang != null
        ? `<span class="wall-etf-shares ${sharesClass}">${sign}${e.shares_zhang.toLocaleString()} 張</span>`
        : ''}
    </div>`;

  const renderCards = (stocks, cardClass, sign, sharesClass, sectionClass, sectionLabel) => {
    if (!stocks.length) return '';
    return `
      <div class="wall-section-label ${sectionClass}">${sectionLabel}</div>
      ${stocks.map(s => `
        <div class="wall-stock-card ${cardClass}">
          <div class="wall-stock-header">
            <a class="stock-link wall-stock-name" href="https://www.wantgoo.com/stock/${s.ticker}/technical-chart" target="_blank" rel="noopener" onclick="event.stopPropagation()">${s.name}</a>
            <a class="stock-link wall-stock-ticker" href="https://www.wantgoo.com/stock/${s.ticker}/technical-chart" target="_blank" rel="noopener" onclick="event.stopPropagation()">${s.ticker}</a>
          </div>
          ${s.etfs.map(e => renderEtfRow(e, sign, sharesClass)).join('')}
        </div>`).join('')}`;
  };

  container.innerHTML = WALL_DATA.map(g => `
    <div class="wall-group">
      <div class="wall-group-date">
        <span>${g.from_label}</span>
        <span class="arrow">→</span>
        <span>${g.to_label}</span>
      </div>
      ${renderCards(g.added_stocks,   'wall-stock-card-add', '+', 'wall-shares-add', 'wall-add-label', '▲ 新增入列')}
      ${renderCards(g.removed_stocks, 'wall-stock-card-rem', '−', 'wall-shares-rem', 'wall-rem-label', '▼ 移出持倉')}
    </div>
  `).join('');
}

function renderHistoryETFTabs() {
  const container = document.getElementById('historyETFTabs');
  if (!container) return;
  container.innerHTML = HISTORY_DATA.map(etf => `
    <button class="history-etf-tab ${etf.ticker === activeHistoryETF ? 'active' : ''}"
            style="--tab-color:${etf.color}"
            onclick="selectHistoryETF('${etf.ticker}')">
      <span class="het-ticker">${etf.ticker}</span>
      <span class="het-name">${etf.name}</span>
    </button>
  `).join('');
}

function selectHistoryETF(ticker) {
  activeHistoryETF = ticker;
  renderHistoryETFTabs();
  renderHistoryContent();
  updateHistoryDesc();
}

function updateHistoryDesc() {
  const etf = HISTORY_DATA.find(e => e.ticker === activeHistoryETF);
  const desc = document.getElementById('historyDesc');
  if (!desc) return;

  const isRealData = etf && etf.real === true && etf.changes && etf.changes[0];
  if (isRealData) {
    const change = etf.changes[0];
    desc.innerHTML = `以下為 ${activeHistoryETF} 於 ${change.from_label} 至 ${change.to_label} 期間的實際持倉變化，包含新增入列、移出持倉及權重調整。`;
  } else {
    desc.innerHTML = `以下為示範資料，呈現主動式 ETF 經理人所做的持倉調整範例，包含新增入列、移出持倉及權重調整。`;
  }
}

function renderHistoryContent() {
  const etf = HISTORY_DATA.find(e => e.ticker === activeHistoryETF);
  const container = document.getElementById('historyContent');
  if (!etf || !container) return;

  const isRealData = etf.real === true && etf.changes && etf.changes[0];
  const dataLabel = isRealData ? '實際數據' : '★ DEMO — 模擬資料';

  container.innerHTML = etf.changes.map(change => `
    <div class="change-event">
      <div class="change-event-header">
        <div class="change-date-range">
          <span class="change-date">${change.from_label}</span>
          <span style="color:var(--text3);margin:0 2px">→</span>
          <span class="change-date">${change.to_label}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <div class="change-pills">
            ${change.added.length   ? `<span class="cpill cpill-add">+${change.added.length} 新增入列</span>`   : ''}
            ${change.removed.length ? `<span class="cpill cpill-rem">−${change.removed.length} 移出持倉</span>` : ''}
            ${change.changed.length ? `<span class="cpill cpill-chg">${change.changed.length} 權重調整</span>`  : ''}
          </div>
          <span class="demo-notice">${dataLabel}</span>
        </div>
      </div>
      <div class="change-body">
        ${renderAdded(change.added)}
        ${renderRemoved(change.removed)}
        ${renderChanged(change.changed)}
        ${renderHoldingsAfter(change.holdings_after, etf.color)}
      </div>
    </div>
  `).join('');
}

function renderAdded(items) {
  if (!items.length) return '';
  return `
    <div class="cs-label cs-label-add">▲ 新增入列</div>
    <div class="ci-grid">
      ${items.map(item => `
        <div class="ci-card ci-card-add">
          <div class="ci-ticker" style="color:var(--green)">
            <a class="stock-link" href="https://www.wantgoo.com/stock/${item.ticker}/technical-chart" target="_blank" rel="noopener">${item.ticker}</a><span class="ci-badge ci-badge-new">NEW</span>
          </div>
          <div class="ci-name"><a class="stock-link" href="https://www.wantgoo.com/stock/${item.ticker}/technical-chart" target="_blank" rel="noopener">${item.name}</a></div>
          <div class="ci-weight">權重 <span>${item.weight.toFixed(2)}%</span></div>
          ${item.shares ? `<div class="ci-weight" style="font-size:11px;color:var(--text3)">張數 <span>${Math.round(item.shares / 1000).toLocaleString('en-US')} 張</span></div>` : ''}
          ${item.reason ? `<div class="ci-reason">${item.reason}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderRemoved(items) {
  if (!items.length) return '';
  return `
    <div class="cs-label cs-label-rem">▼ 移出持倉</div>
    <div class="ci-grid">
      ${items.map(item => `
        <div class="ci-card ci-card-rem">
          <div class="ci-ticker" style="color:var(--red)">
            <a class="stock-link" href="https://www.wantgoo.com/stock/${item.ticker}/technical-chart" target="_blank" rel="noopener">${item.ticker}</a><span class="ci-badge ci-badge-out">OUT</span>
          </div>
          <div class="ci-name"><a class="stock-link" href="https://www.wantgoo.com/stock/${item.ticker}/technical-chart" target="_blank" rel="noopener">${item.name}</a></div>
          <div class="ci-weight" style="text-decoration:line-through;opacity:0.6">權重 <span>${item.weight.toFixed(2)}%</span></div>
          ${item.shares ? `<div class="ci-weight" style="font-size:11px;color:var(--text3);text-decoration:line-through;opacity:0.6">張數 <span>${Math.round(item.shares / 1000).toLocaleString('en-US')} 張</span></div>` : ''}
          ${item.reason ? `<div class="ci-reason">${item.reason}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderChanged(items) {
  if (!items.length) return '';
  return `
    <div class="cs-label cs-label-chg">◆ 權重調整</div>
    <div class="ci-grid">
      ${items.map(item => {
        const up   = item.to_weight > item.from_weight;
        const diff = (item.to_weight - item.from_weight).toFixed(2);
        const sign = up ? '+' : '';
        const clr  = up ? 'var(--green)' : '#fb923c';
        const arr  = up ? '↑' : '↓';
        const fromShares = item.from_shares ? Math.round(item.from_shares / 1000) : null;
        const toShares = item.to_shares ? Math.round(item.to_shares / 1000) : null;
        const sharesDiff = fromShares && toShares ? (toShares - fromShares) : null;
        const sharesDir = sharesDiff ? (sharesDiff >= 0 ? '+' : '') : '';
        return `
          <div class="ci-card ${up ? 'ci-card-up' : 'ci-card-dn'}">
            <div class="ci-ticker" style="color:var(--accent)"><a class="stock-link" href="https://www.wantgoo.com/stock/${item.ticker}/technical-chart" target="_blank" rel="noopener">${item.ticker}</a></div>
            <div class="ci-name"><a class="stock-link" href="https://www.wantgoo.com/stock/${item.ticker}/technical-chart" target="_blank" rel="noopener">${item.name}</a></div>
            <div class="ci-wchange">
              <span style="color:var(--text3)">${item.from_weight.toFixed(2)}%</span>
              <span style="color:var(--text3)">→</span>
              <span style="font-weight:600">${item.to_weight.toFixed(2)}%</span>
              <span style="color:${clr};font-size:12px">${arr} ${sign}${diff}%</span>
            </div>
            ${sharesDiff !== null ? `<div style="font-size:11px;color:var(--text3);margin-top:4px">
              <span>${fromShares.toLocaleString('en-US')} 張</span>
              <span style="color:var(--text3)">→</span>
              <span style="font-weight:600">${toShares.toLocaleString('en-US')} 張</span>
              <span style="color:${clr}">${sharesDir}${sharesDiff.toLocaleString('en-US')} 張</span>
            </div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderHoldingsAfter(holdings, etfColor) {
  if (!holdings || !holdings.length) return '';
  const maxW = Math.max(...holdings.map(h => h.weight));
  return `
    <div class="holdings-after-section">
      <div class="cs-label cs-label-hold">■ 調整後完整持倉</div>
      <div class="holdings-after-grid">
        ${holdings.map(h => `
          <div class="ha-item ${h.new ? 'new-entry' : ''}">
            ${h.new ? '<span class="new-badge-sm">NEW</span>' : ''}
            <div class="ha-ticker ${h.new ? 'new-c' : ''}"><a class="stock-link" href="https://www.wantgoo.com/stock/${h.ticker}/technical-chart" target="_blank" rel="noopener">${h.ticker}</a></div>
            <div class="ha-name"><a class="stock-link" href="https://www.wantgoo.com/stock/${h.ticker}/technical-chart" target="_blank" rel="noopener">${h.name}</a></div>
            <div class="ha-weight">${h.weight.toFixed(2)}%</div>
            <div class="ha-bar">
              <div class="ha-bar-fill"
                   style="width:${(h.weight/maxW*100).toFixed(1)}%;background:${h.new ? 'var(--green)' : etfColor}"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────
renderETFCards();
renderTable();
if (HISTORY_DATA.length > 0) {
  updateHistoryDesc();
}
</script>
